<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Phishing Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      width: 320px;
      min-height: 200px;
      background: #f8f9fa;
      color: #212529;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 { font-size: 14px; font-weight: 600; }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #6c757d;
      flex-shrink: 0;
    }
    .status-dot.connected  { background: #28a745; }
    .status-dot.error      { background: #dc3545; }

    main { padding: 14px 16px; }

    .url-display {
      font-size: 11px;
      color: #495057;
      background: #e9ecef;
      border-radius: 6px;
      padding: 6px 10px;
      word-break: break-all;
      margin-bottom: 12px;
      max-height: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .verdict-card {
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .verdict-card.phishing   { background: #ffe8e8; border-left: 4px solid #dc3545; }
    .verdict-card.suspicious { background: #fff3cd; border-left: 4px solid #ffc107; }
    .verdict-card.safe       { background: #e8f5e9; border-left: 4px solid #28a745; }
    .verdict-card.loading    { background: #e9ecef; border-left: 4px solid #6c757d; }

    .verdict-icon { font-size: 24px; }

    .verdict-info strong { display: block; font-size: 14px; margin-bottom: 2px; }
    .verdict-info span   { font-size: 12px; color: #555; }

    .confidence-bar {
      height: 6px;
      border-radius: 3px;
      background: #dee2e6;
      overflow: hidden;
      margin-top: 4px;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .phishing   .confidence-fill { background: #dc3545; }
    .suspicious .confidence-fill { background: #ffc107; }
    .safe       .confidence-fill { background: #28a745; }

    button#check-btn {
      width: 100%;
      padding: 9px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button#check-btn:hover { background: #16213e; }
    button#check-btn:disabled { background: #adb5bd; cursor: not-allowed; }

    .error-msg {
      font-size: 12px;
      color: #dc3545;
      text-align: center;
      margin-top: 8px;
    }

    footer {
      border-top: 1px solid #dee2e6;
      padding: 8px 16px;
      font-size: 10px;
      color: #adb5bd;
      text-align: center;
    }
    footer a { color: #6c757d; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="api-dot"></div>
  <h1>Web Phishing Detector</h1>
</header>

<main>
  <div class="url-display" id="url-display">Đang tải URL…</div>

  <div class="verdict-card loading" id="verdict-card">
    <div class="verdict-icon" id="verdict-icon">🔍</div>
    <div class="verdict-info">
      <strong id="verdict-text">Chưa kiểm tra</strong>
      <span id="confidence-text">—</span>
      <div class="confidence-bar">
        <div class="confidence-fill" id="confidence-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <button id="check-btn">Kiểm tra ngay</button>
  <p class="error-msg" id="error-msg"></p>
</main>

<footer>
  <a href="http://127.0.0.1:8501" target="_blank">Mở Dashboard</a>
  &nbsp;|&nbsp; API: <span id="api-status">kết nối…</span>
</footer>

<script src="popup.js"></script>
</body>
</html>
